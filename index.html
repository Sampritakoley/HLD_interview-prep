<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HLD Question Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #222535;
    --border: #2e3147;
    --text: #e2e4ef;
    --text2: #8b90a8;
    --text3: #5a5f7a;
    --accent: #6c63ff;
    --accent-light: rgba(108,99,255,0.12);
    --green: #22c55e;
    --green-light: rgba(34,197,94,0.1);
    --orange: #f97316;
    --red: #ef4444;
    --blue: #3b82f6;
    --card-done-bg: rgba(34,197,94,0.05);
    --card-done-border: #22c55e;
    --scrollbar: #2e3147;
  }
  :root[data-theme="light"] {
    --bg: #f0f2f8;
    --bg2: #ffffff;
    --bg3: #e8eaf2;
    --border: #d1d5e8;
    --text: #1a1d27;
    --text2: #4a4f6a;
    --text3: #8b90a8;
    --accent: #6c63ff;
    --accent-light: rgba(108,99,255,0.1);
    --green: #16a34a;
    --green-light: rgba(22,163,74,0.1);
    --orange: #ea6c00;
    --red: #dc2626;
    --blue: #2563eb;
    --card-done-bg: rgba(22,163,74,0.06);
    --card-done-border: #16a34a;
    --scrollbar: #d1d5e8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.2s, color 0.2s;
  }

  /* HEADER */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .header-title h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header-title p {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 2px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .stat-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text2);
    white-space: nowrap;
  }
  .pill span {
    color: var(--text);
  }
  .pill.accent span { color: var(--accent); }
  .pill.green span { color: var(--green); }

  .theme-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    cursor: pointer;
    font-size: 1rem;
    color: var(--text2);
    transition: all 0.2s;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--text); }

  .progress-wrap {
    margin-top: 10px;
    background: var(--bg3);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* FILTERS */
  .filters {
    position: sticky;
    top: 83px;
    z-index: 90;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 180px;
    max-width: 260px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 0.82rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border 0.2s;
  }
  .search-box::placeholder { color: var(--text3); }
  .search-box:focus { border-color: var(--accent); }

  select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.8rem;
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    outline: none;
    cursor: pointer;
    transition: border 0.2s;
  }
  select:focus { border-color: var(--accent); color: var(--text); }

  .toggle-label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--text2);
    cursor: pointer;
    white-space: nowrap;
  }
  .toggle-label input { accent-color: var(--accent); cursor: pointer; }

  .filter-badge {
    background: var(--accent);
    color: #fff;
    border-radius: 10px;
    padding: 2px 7px;
    font-size: 0.7rem;
    font-weight: 700;
    display: none;
  }
  .filter-badge.visible { display: inline-block; }

  .clear-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  .reset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
    margin-left: auto;
  }
  .reset-btn:hover { border-color: var(--orange); color: var(--orange); }

  /* MAIN */
  .main {
    padding: 20px 24px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .count-bar {
    font-size: 0.78rem;
    color: var(--text3);
    margin-bottom: 16px;
  }
  .count-bar strong { color: var(--text2); }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }

  /* CARD */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid transparent;
    border-radius: 12px;
    padding: 16px;
    transition: all 0.2s ease;
    position: relative;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.3s ease forwards;
    cursor: default;
    outline: none;
  }
  .card:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 2px var(--accent-light); }
  .card:hover { border-color: var(--border); box-shadow: 0 2px 12px rgba(0,0,0,0.15); }
  .card.done {
    background: var(--card-done-bg);
    border-left-color: var(--card-done-border) !important;
  }
  .card.done .card-title { text-decoration: line-through; opacity: 0.6; }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .check-icon {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 22px;
    height: 22px;
    background: var(--green);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    color: #fff;
    font-weight: 700;
  }
  .card.done .check-icon { display: flex; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    min-width: 0;
    line-height: 1.3;
    padding-right: 28px;
  }

  .badge {
    display: inline-block;
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 0.68rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-cat { background: var(--accent-light); color: var(--accent); }
  .badge-easy { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-medium-d { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-hard { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-vh { background: rgba(239,68,68,0.15); color: var(--red); }
  .badge-h { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-m { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-l { background: rgba(139,144,168,0.15); color: var(--text3); }

  .meta-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .companies-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    align-items: center;
  }
  .co-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.65rem;
    color: var(--text2);
    font-weight: 500;
  }
  .co-more {
    font-size: 0.65rem;
    color: var(--text3);
  }

  .tags-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .tag-chip {
    background: var(--bg3);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 0.65rem;
    color: var(--text3);
  }

  .done-btn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .done-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .card.done .done-btn {
    background: var(--green-light);
    border-color: var(--green);
    color: var(--green);
  }

  /* EMPTY STATE */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    display: none;
  }
  .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }
  .empty-state.visible { display: block; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 0.72rem;
    color: var(--text3);
    border-top: 1px solid var(--border);
  }
  footer kbd {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 0.7rem;
    font-family: monospace;
    color: var(--text2);
  }

  @media (max-width: 768px) {
    .header { padding: 12px 16px; }
    .filters { padding: 10px 16px; top: 80px; }
    .main { padding: 14px 16px 40px; }
    .grid { grid-template-columns: 1fr; }
    .search-box { max-width: 100%; }
    .stat-pills { gap: 5px; }
    .pill { padding: 3px 9px; font-size: 0.68rem; }
  }

  /* Cat colors */
  .cat-social { background: rgba(168,85,247,0.12); color: #a855f7; }
  .cat-messaging { background: rgba(6,182,212,0.12); color: #06b6d4; }
  .cat-video { background: rgba(239,68,68,0.12); color: #ef4444; }
  .cat-storage { background: rgba(249,115,22,0.12); color: #f97316; }
  .cat-search { background: rgba(234,179,8,0.12); color: #ca8a04; }
  .cat-ecommerce { background: rgba(34,197,94,0.12); color: #22c55e; }
  .cat-ride { background: rgba(59,130,246,0.12); color: #3b82f6; }
  .cat-caching { background: rgba(236,72,153,0.12); color: #ec4899; }
  .cat-notif { background: rgba(20,184,166,0.12); color: #14b8a6; }
  .cat-gaming { background: rgba(139,92,246,0.12); color: #8b5cf6; }
  .cat-adtech { background: rgba(245,158,11,0.12); color: #d97706; }
  .cat-auth { background: rgba(99,102,241,0.12); color: #6366f1; }
  .cat-db { background: rgba(16,185,129,0.12); color: #10b981; }
  .cat-india { background: rgba(244,63,94,0.12); color: #f43f5e; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-title">
      <h1>HLD Question Bank</h1>
      <p>Interview prep tracker — FAANG + MAANG + Indian Unicorns</p>
    </div>
    <div class="header-right">
      <div class="stat-pills">
        <div class="pill">Total <span id="s-total">200</span></div>
        <div class="pill green">Done <span id="s-done">0</span></div>
        <div class="pill">Left <span id="s-left">200</span></div>
        <div class="pill accent">% <span id="s-pct">0</span></div>
      </div>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
</header>

<div class="filters">
  <input class="search-box" type="text" id="searchBox" placeholder="🔍 Search problems or tags…">
  <select id="catFilter">
    <option value="">All Categories</option>
    <option>Social Media &amp; Feeds</option>
    <option>Messaging &amp; Chat</option>
    <option>Video &amp; Streaming</option>
    <option>Storage &amp; File Systems</option>
    <option>Search &amp; Recommendations</option>
    <option>E-commerce &amp; Payments</option>
    <option>Ride-sharing &amp; Maps &amp; Location</option>
    <option>Caching &amp; Rate Limiting &amp; API</option>
    <option>Notifications &amp; Messaging Infra</option>
    <option>Gaming &amp; Real-time Systems</option>
    <option>Ad Tech &amp; Analytics</option>
    <option>Auth &amp; Security</option>
    <option>Databases &amp; Distributed Systems</option>
    <option>India-specific</option>
  </select>
  <select id="diffFilter">
    <option value="">All Difficulty</option>
    <option>Easy</option>
    <option>Medium</option>
    <option>Hard</option>
  </select>
  <select id="freqFilter">
    <option value="">All Frequency</option>
    <option>Very High</option>
    <option>High</option>
    <option>Medium</option>
    <option>Low</option>
  </select>
  <select id="compFilter">
    <option value="">All Companies</option>
    <option>Google</option><option>Meta</option><option>Amazon</option>
    <option>Apple</option><option>Netflix</option><option>Microsoft</option>
    <option>Uber</option><option>LinkedIn</option><option>Twitter/X</option>
    <option>Airbnb</option><option>Stripe</option><option>Shopify</option>
    <option>Flipkart</option><option>Swiggy</option><option>Zomato</option>
    <option>Razorpay</option><option>PhonePe</option><option>CRED</option>
    <option>Ola</option><option>Meesho</option><option>Atlassian</option>
    <option>Slack</option><option>Spotify</option><option>Pinterest</option>
    <option>Snapchat</option><option>ByteDance</option><option>Grab</option>
    <option>Paytm</option><option>Dream11</option><option>Zepto</option>
  </select>
  <select id="sortFilter">
    <option value="freq">Sort: Frequency</option>
    <option value="diff">Sort: Difficulty</option>
    <option value="co">Sort: Company Count</option>
    <option value="alpha">Sort: A–Z</option>
    <option value="status">Sort: Completion</option>
  </select>
  <label class="toggle-label">
    <input type="checkbox" id="incompleteOnly"> Incomplete only
  </label>
  <span class="filter-badge" id="filterBadge">0</span>
  <button class="clear-btn" id="clearFilters">Clear filters</button>
  <button class="reset-btn" id="resetBtn">Reset progress</button>
</div>

<div class="main">
  <div class="count-bar" id="countBar">Showing <strong id="shownCount">200</strong> of 200 questions</div>
  <div class="grid" id="grid">
    <div class="empty-state" id="emptyState">
      <div class="emoji">🔭</div>
      <p>No questions match your filters.<br>Try adjusting or clearing them.</p>
    </div>
  </div>
</div>

<footer>
  <kbd>D</kbd> on focused card to toggle done &nbsp;·&nbsp; <kbd>Tab</kbd> to navigate cards
</footer>

const CAT_CLASS = {
  "Social Media & Feeds": "cat-social",
  "Messaging & Chat": "cat-messaging",
  "Video & Streaming": "cat-video",
  "Storage & File Systems": "cat-storage",
  "Search & Recommendations": "cat-search",
  "E-commerce & Payments": "cat-ecommerce",
  "Ride-sharing & Maps & Location": "cat-ride",
  "Caching & Rate Limiting & API": "cat-caching",
  "Notifications & Messaging Infra": "cat-notif",
  "Gaming & Real-time Systems": "cat-gaming",
  "Ad Tech & Analytics": "cat-adtech",
  "Auth & Security": "cat-auth",
  "Databases & Distributed Systems": "cat-db",
  "India-specific": "cat-india",
};

const FREQ_ORDER = {"Very High":4,"High":3,"Medium":2,"Low":1};
const DIFF_ORDER = {"Hard":3,"Medium":2,"Easy":1};
const LS_KEY = 'hld_progress';
const LS_THEME = 'hld_theme';

let doneSet = new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]'));

function saveProgress() {
  localStorage.setItem(LS_KEY, JSON.stringify([...doneSet]));
}

function updateStats() {
  const done = doneSet.size;
  const total = QUESTIONS.length;
  const pct = Math.round((done/total)*100);
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-left').textContent = total - done;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';
}

function freqBadgeClass(f) {
  return {
    "Very High":"badge-vh",
    "High":"badge-h",
    "Medium":"badge-m",
    "Low":"badge-l"
  }[f]||"badge-l";
}
function diffBadgeClass(d) {
  return {"Easy":"badge-easy","Medium":"badge-medium-d","Hard":"badge-hard"}[d]||"badge-easy";
}

function buildCard(q, delay) {
  const done = doneSet.has(q.id);
  const cos = q.companies.slice(0,5).map(c=>`<span class="co-pill">${c}</span>`).join('');
  const more = q.companies.length > 5 ? `<span class="co-more">+${q.companies.length-5} more</span>` : '';
  const tags = q.tags.map(t=>`<span class="tag-chip">${t}</span>`).join('');

  const card = document.createElement('div');
  card.className = 'card' + (done?' done':'');
  card.setAttribute('tabindex','0');
  card.dataset.id = q.id;
  card.style.animationDelay = delay+'ms';
  card.innerHTML = `
    <div class="check-icon">✓</div>
    <div class="card-title">${q.problem}</div>
    <div class="meta-row">
      <span class="badge ${CAT_CLASS[q.category]||'badge-cat'}">${q.category}</span>
      <span class="badge ${diffBadgeClass(q.difficulty)}">${q.difficulty}</span>
      <span class="badge ${freqBadgeClass(q.frequency)}">${q.frequency}</span>
    </div>
    <div class="companies-row">${cos}${more}</div>
    <div class="tags-row">${tags}</div>
    <button class="done-btn">${done?'✓ Completed':'Mark Done ✓'}</button>
  `;

  card.querySelector('.done-btn').addEventListener('click', (e)=>{
    e.stopPropagation();
    toggleDone(q.id, card);
  });

  card.addEventListener('keydown', (e)=>{
    if(e.key === 'd' || e.key === 'D') { toggleDone(q.id, card); }
  });

  return card;
}

function toggleDone(id, card) {
  if(doneSet.has(id)) {
    doneSet.delete(id);
    card.classList.remove('done');
    card.querySelector('.done-btn').textContent = 'Mark Done ✓';
  } else {
    doneSet.add(id);
    card.classList.add('done');
    card.querySelector('.done-btn').textContent = '✓ Completed';
  }
  saveProgress();
  updateStats();
}

function getFiltered() {
  const search = document.getElementById('searchBox').value.toLowerCase().trim();
  const cat = document.getElementById('catFilter').value;
  const diff = document.getElementById('diffFilter').value;
  const freq = document.getElementById('freqFilter').value;
  const comp = document.getElementById('compFilter').value;
  const sort = document.getElementById('sortFilter').value;
  const incompleteOnly = document.getElementById('incompleteOnly').checked;

  let list = QUESTIONS.filter(q => {
    if(cat && q.category !== cat) return false;
    if(diff && q.difficulty !== diff) return false;
    if(freq && q.frequency !== freq) return false;
    if(comp && !q.companies.includes(comp)) return false;
    if(incompleteOnly && doneSet.has(q.id)) return false;
    if(search) {
      const searchable = q.problem.toLowerCase() + ' ' + q.tags.join(' ').toLowerCase();
      if(!searchable.includes(search)) return false;
    }
    return true;
  });

  list.sort((a,b)=>{
    if(sort==='freq') return FREQ_ORDER[b.frequency]-FREQ_ORDER[a.frequency];
    if(sort==='diff') return DIFF_ORDER[b.difficulty]-DIFF_ORDER[a.difficulty];
    if(sort==='co') return b.companies.length-a.companies.length;
    if(sort==='alpha') return a.problem.localeCompare(b.problem);
    if(sort==='status') {
      const ad = doneSet.has(a.id)?1:0, bd = doneSet.has(b.id)?1:0;
      return ad-bd;
    }
    return 0;
  });

  return list;
}

function countActiveFilters() {
  let c = 0;
  if(document.getElementById('catFilter').value) c++;
  if(document.getElementById('diffFilter').value) c++;
  if(document.getElementById('freqFilter').value) c++;
  if(document.getElementById('compFilter').value) c++;
  if(document.getElementById('incompleteOnly').checked) c++;
  if(document.getElementById('searchBox').value.trim()) c++;
  return c;
}

function render() {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  // Remove old cards but keep empty state
  [...grid.querySelectorAll('.card')].forEach(c=>c.remove());

  const list = getFiltered();
  document.getElementById('shownCount').textContent = list.length;

  const badge = document.getElementById('filterBadge');
  const ac = countActiveFilters();
  badge.textContent = ac;
  badge.classList.toggle('visible', ac > 0);

  if(list.length === 0) {
    empty.classList.add('visible');
  } else {
    empty.classList.remove('visible');
    list.forEach((q, i) => {
      const delay = Math.min(i * 30, 600);
      grid.appendChild(buildCard(q, delay));
    });
  }

  updateStats();
}

// Theme
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
}
const savedTheme = localStorage.getItem(LS_THEME) || 'dark';
applyTheme(savedTheme);
document.getElementById('themeBtn').addEventListener('click', () => {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  applyTheme(next);
  localStorage.setItem(LS_THEME, next);
});

// Filter events
['searchBox','catFilter','diffFilter','freqFilter','compFilter','sortFilter'].forEach(id=>{
  document.getElementById(id).addEventListener('input', render);
  document.getElementById(id).addEventListener('change', render);
});
document.getElementById('incompleteOnly').addEventListener('change', render);

document.getElementById('clearFilters').addEventListener('click', () => {
  document.getElementById('searchBox').value = '';
  document.getElementById('catFilter').value = '';
  document.getElementById('diffFilter').value = '';
  document.getElementById('freqFilter').value = '';
  document.getElementById('compFilter').value = '';
  document.getElementById('sortFilter').value = 'freq';
  document.getElementById('incompleteOnly').checked = false;
  render();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if(confirm('Reset all progress? This cannot be undone.')) {
    doneSet.clear();
    saveProgress();
    render();
  }
});

render();
